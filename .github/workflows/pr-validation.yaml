name: Pull Request Validation

on:
  pull_request:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: |
        npm install htmlhint stylelint parcel-bundler --save-dev

    - name: Lint HTML files
      run: |
        npx htmlhint --config .htmlhintrc.json src/**/*.html

    - name: Lint CSS files
      run: |
        npx stylelint "**/*.css"

  build:
    runs-on: ubuntu-latest

    needs: lint

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: |
        npm install parcel-bundler --save-dev

    - name: Build the website
      run: npx parcel build src/index.html
